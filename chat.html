<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Distributor Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 800px;
    height: 90vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: #4f46e5;
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  .header p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }

  /* Suggestions */
  .suggestions {
    padding: 16px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #f0f2f5;
  }
  .suggestion {
    background: #f0f2f5;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    color: #4f46e5;
    font-weight: 500;
    transition: all 0.2s;
  }
  .suggestion:hover {
    background: #4f46e5;
    color: white;
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    gap: 12px;
  }
  .empty-icon {
    font-size: 48px;
  }
  .empty-state p {
    font-size: 15px;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 600;
  }
  .avatar.ai {
    background: #4f46e5;
    color: white;
  }
  .avatar.user {
    background: #22c55e;
    color: white;
  }

  .bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .message.user .bubble {
    background: #4f46e5;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.ai .bubble {
    background: #f8fafc;
    color: #1e293b;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing span {
    width: 8px;
    height: 8px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid #f0f2f5;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea:focus {
    border-color: #4f46e5;
  }

  .send-btn {
    width: 44px;
    height: 44px;
    background: #4f46e5;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover {
    background: #4338ca;
    transform: scale(1.05);
  }
  .send-btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    transform: none;
  }
  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="header-dot"></div>
        <h1>Distributor AI Assistant</h1>
      </div>
      <p>Connected to your real database</p>
    </div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">Business summary</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Pending payments</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Show recent orders</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Total revenue</button>
  </div>

  <!-- Chat messages -->
  <div class="chat" id="chat">
    <div class="empty-state" id="empty">
      <div class="empty-icon">🤖</div>
      <p>Ask me anything about your orders</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="input"
      placeholder="Ask about orders, payments, buyers..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
  const API = 'http://localhost:7000'
  let chatHistory = []
  let isLoading = false

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  }

  function sendSuggestion(btn) {
    document.getElementById('input').value = btn.textContent
    sendMessage()
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat')

    // Remove empty state
    const empty = document.getElementById('empty')
    if (empty) empty.remove()

    const msg = document.createElement('div')
    msg.className = `message ${role}`
    msg.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? '🤖' : 'U'}</div>
      <div class="bubble" id="msg-${Date.now()}">${text}</div>
    `
    chat.appendChild(msg)
    chat.scrollTop = chat.scrollHeight
    return msg.querySelector('.bubble')
  }

  function addTyping() {
    const chat = document.getElementById('chat')
    const empty = document.getElementById('empty')
    if (empty) empty.remove()

    const typing = document.createElement('div')
    typing.className = 'message ai'
    typing.id = 'typing'
    typing.innerHTML = `
      <div class="avatar ai">🤖</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>
    `
    chat.appendChild(typing)
    chat.scrollTop = chat.scrollHeight
    return typing
  }

  async function sendMessage() {
    const input = document.getElementById('input')
    const sendBtn = document.getElementById('sendBtn')
    const message = input.value.trim()

    if (!message || isLoading) return

    isLoading = true
    sendBtn.disabled = true
    input.value = ''
    input.style.height = 'auto'

    // Show user message
    addMessage('user', message)

    // Show typing indicator
    const typingEl = addTyping()

    try {
      // Call simple API
      const response = await fetch(`${API}/chat/simple`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, chatHistory })
      })

      const data = await response.json()

      // Remove typing indicator
      typingEl.remove()

      if (data.error) {
        addMessage('ai', '❌ Error: ' + data.error)
        return
      }

      // Show AI reply
      addMessage('ai', data.reply)

      // Update history
      chatHistory = data.chatHistory

    } catch (err) {
      typingEl.remove()
      addMessage('ai', '❌ Cannot connect to API. Make sure server is running on port 3000.')
    }

    isLoading = false
    sendBtn.disabled = false
    input.focus()
  }
</script>

</body>
</html>
